<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Pokedex</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/x-icon" href="./assets/icon/pokeball_icon.png">
</head>

<body onload="init()">
    <header>
        <div class="header-wrapper">
            <div class="logo-wrapper">
                <img src="https://logos-world.net/wp-content/uploads/2020/05/Pokemon-Logo.png" class="pokemon-logo"
                    alt="Pokédex Logo">

                <span class="header-badge">Pokédex</span>
            </div>

            <div class="search-wrapper">
                <input type="search" autocomplete="off" data-id="search-input" id="search_pokemon_input"
                    class="search-input" placeholder="Search Pokémon..." oninput="searchPokemon()">

                <p id="search-warning" class="search-warning" hidden>
                    At least 3 characters!
                </p>
            </div>
        </div>
    </header>
    <main data-id="content">
        <div id="content" class="content"></div>
        <div class="button_wrapper">
            <button onclick="fetchMorePokemons()" hidden disabled data-id="load-more-button" id="load_more">load
                more</button>
        </div>
        <div id="loading" hidden>
            <img src="./assets/icon/pokeball_icon.png" class="loader">
            <p>Loading...</p>
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-left">
                <img src="./assets/icon/pokeball_icon.png" alt="Pokéball">
                <span>Pokédex</span>
            </div>

            <div class="footer-right">
                <p>Powered by PokéAPI</p>
                <p>Made by Muhammed</p>
            </div>
        </div>
    </footer>
</body>
<dialog data-id="dialog" id="pokeinfo"></dialog>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./script.js"></script>
<script src="./scripts/template.js"></script>
<script src="./scripts/typeColours.js"></script>

</html>
