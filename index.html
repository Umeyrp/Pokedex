<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/x-icon" href="./assets/icon/pokeball_icon.png">
</head>

<body onload="init()">
    <header></header>
    <main data-id="content">
        <input type="search" id="search_pokemon_input" placeholder="Suche Pokémon..." oninput="searchPokemon()">
        <div id="content" class="content"></div>
        <div class="button_wrapper">
            <button onclick="fetchMorePokemons()" hidden disabled id="load_more">load more</button>
        </div>
        <div id="loading" hidden>
            <img src="./assets/icon/pokeball_icon.png" class="loader">
            <p>Laden...</p>
        </div>
    </main>
    <footer></footer>
</body>
<dialog id="pokeinfo"></dialog>
<script src="./script.js"></script>
<script src="./scripts/template.js"></script>
<script src="./scripts/typeColours.js"></script>

</html>
